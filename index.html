<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Notifications page</title>

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      font-family: 'Plus Jakarta Sans', serif;
      margin: 0;
    }

    .notif-container {
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .notif-card {
      background-color: hsl(0, 100%, 100%);
      padding: 20px;
      max-width: 750px;
      width: 100%;
      border-radius: 15px;
      box-shadow: 0 10px 50px rgba(0, 0, 0, 0.1);
    }

    .notif-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .notif-title {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .notif-unreadCount {
      background-color: hsl(219, 85%, 26%);
      color: white;
      padding: 2px 12px;
      border-radius: 6px;
      font-weight: 800;
    }

    .mark-notifs {
      background: none;
      border: none;
      color: hsl(219, 12%, 42%);
    }

    .notif-item {
      display: flex;
      gap: 15px;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .notif-item img {
      width: 45px;
      height: 45px;
    }

    .unread {
      background-color: hsl(210, 60%, 98%);
    }

    .unread-dot {
      width: 8px;
      height: 8px;
      background-color: hsl(1, 90%, 64%);
      border-radius: 50%;
      display: inline-block;
    }
    .notif-content {
      flex: 1;
    }

    .private-message {
      margin-top: 12px;
      padding: 16px;
      border: 1px solid hsl(205, 33%, 90%);
      border-radius: 5px;
      color: hsl(219, 12%, 42%);
      line-height: 1.5;
    }
    
  .notif-time {
      color: gray;
    }

    @media (max-width: 375px) {
      body {
        margin: 0;
        background-color: hsl(210, 60%, 98%);
      }

      .notif-container {
        padding: 0;
        height: auto;
      }

      .notif-card {
        width: 100%;
        min-height: 100vh;
        border-radius: 0;
        padding: 20px 16px;
        box-shadow: none;
      }

      .notif-header {
        align-items: center;
      }

      .notif-item {
        padding: 14px;
        gap: 12px;
      }

      .notif-item img {
        width: 40px;
        height: 40px;
      }

      .notif-title h1 {
        font-size: 1.3rem;
      }

      .mark-notifs {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <main class="notif-container">
    <div class="notif-card">

      <div class="notif-header">
        <div class="notif-title">
          <h1>Notifications </h1>
          <span class="notif-unreadCount" id="notif-unreadCount">3</span>
        </div>
        <button id="mark-as-read" class="mark-notifs">Mark all as read</button>
      </div>
      <!-- Notifications go here -->
      <div id="notif-list" class="notif-list">
      <!-- Will be updated in JS -->
      </div>

    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
<script src="js/script.js"></script>
</html>
