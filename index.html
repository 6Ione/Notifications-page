<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Notifications page</title>

  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }

    body {
      font-family: 'Plus Jakarta Sans', serif;
    }

    .notif-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .notif-card {
      background-color: hsl(210, 60%, 98%);
      padding: 20px;
    }

    .notif-count {
      color: hsl(0, 100%, 100%);
      background-color: hsl(219, 12%, 42%);
    }
    @media (min-width: 768px) {

    }

    @media (min-width: 1440px) {

    }
  </style>
</head>
<body>
  <main class="notif-container">
    <div class="notif-card">
      <div class="notif-header">
        <h1>Notifications </h1>
        <span id="notif-unreadCount" class="notif-count">3</span>

        <button id="mark-as-read" class="mark-notifs">Mark all as read</button>
      </div>

        <!-- Notifications go here -->
      <div class="notif-list">
        <div id="notif-1" class="notif-item">
          <img id="notif-1-avatar" src="" alt="notif-user-Image">
          <p>
            <strong id="notif-1-name"></strong>
            <span id="notif-1-action"></span>
          </p>
          <span id="notif-1-time"></span>
        </div>
      </div>
    </div>
  </main>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
